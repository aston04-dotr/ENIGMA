<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
    <title>Код для входа в Enigma</title>
    <style>
      .mail-bg {
        background: #f3f5fa !important;
      }
      .mail-card {
        background: #ffffff !important;
        border-color: #e6eaf2 !important;
      }
      .muted {
        color: #5f6b7a !important;
      }
      .title {
        color: #151b2c !important;
      }
      .code-wrap {
        background: linear-gradient(180deg, #f8faff 0%, #f2f5fb 100%) !important;
        border-color: #dbe3f1 !important;
      }
      .code-text {
        color: #1a2233 !important;
      }
      .copy-hint {
        color: #7b8698 !important;
      }
      .copy-cta {
        background: linear-gradient(180deg, #2f3e5e 0%, #273552 100%) !important;
        color: #eff4ff !important;
      }
      @media (prefers-color-scheme: dark) {
        .mail-bg {
          background: #0d1118 !important;
        }
        .mail-card {
          background: #121925 !important;
          border-color: #253044 !important;
        }
        .muted {
          color: #a5b1c3 !important;
        }
        .title {
          color: #eef3ff !important;
        }
        .code-wrap {
          background: linear-gradient(180deg, #192235 0%, #141d2d 100%) !important;
          border-color: #2d3c57 !important;
        }
        .code-text {
          color: #f2f6ff !important;
        }
        .copy-hint {
          color: #93a4bf !important;
        }
        .copy-cta {
          background: linear-gradient(180deg, #d9e4ff 0%, #bfcef7 100%) !important;
          color: #17233b !important;
        }
      }
    </style>
  </head>
  <body class="mail-bg" style="margin:0;padding:0;background:#f3f5fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Arial,sans-serif;color:#151b2c;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:28px 12px;" class="mail-bg">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" class="mail-card" style="max-width:560px;background:#ffffff;border-radius:18px;overflow:hidden;border:1px solid #e6eaf2;">
            <tr>
              <td style="padding:30px 28px 10px 28px;">
                <p style="margin:0 0 10px 0;font-size:11px;letter-spacing:0.19em;text-transform:uppercase;color:#6b7ea4;font-weight:700;">
                  ENIGMA
                </p>
                <h1 class="title" style="margin:0;font-size:30px;line-height:1.2;color:#151b2c;font-weight:700;">
                  Код для входа в Enigma
                </h1>
              </td>
            </tr>

            <tr>
              <td style="padding:12px 28px 6px 28px;">
                <p class="muted" style="margin:0;font-size:16px;line-height:1.65;color:#5f6b7a;">
                  Скопируйте этот код и вставьте его в Enigma.
                </p>
              </td>
            </tr>

            <tr>
              <td style="padding:18px 28px 8px 28px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                  <tr>
                    <td class="code-wrap" align="center" style="background:#f4f7fc;border:1px solid #dbe3f1;border-radius:16px;padding:20px 14px;">
                      <div class="code-text" style="font-size:38px;line-height:1;letter-spacing:0.32em;font-weight:700;color:#1a2233;user-select:all;">
                        {{ .Token }}
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td style="padding:14px 28px 0 28px;">
                <div class="copy-cta" style="display:block;width:100%;box-sizing:border-box;text-align:center;background:#2f3e5e;color:#eff4ff;font-size:16px;font-weight:600;line-height:1;padding:15px;border-radius:14px;">
                  Скопируйте код и вставьте в Enigma
                </div>
              </td>
            </tr>

            <tr>
              <td style="padding:14px 28px 30px 28px;">
                <p class="copy-hint" style="margin:0;font-size:13px;line-height:1.65;color:#7b8698;">
                  Скопируйте код для входа.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
