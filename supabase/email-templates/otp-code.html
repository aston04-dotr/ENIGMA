<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Код для входа в Enigma</title>
  </head>
  <body style="margin:0;padding:0;background:#f6f7fb;font-family:Inter,Arial,sans-serif;color:#0f172a;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f6f7fb;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #e8ebf3;">
            <tr>
              <td style="padding:28px 24px 8px 24px;">
                <p style="margin:0 0 8px 0;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:#6d28d9;font-weight:700;">
                  ENIGMA
                </p>
                <h1 style="margin:0;font-size:28px;line-height:1.2;color:#111827;font-weight:800;">
                  Код для входа в Enigma
                </h1>
              </td>
            </tr>

            <tr>
              <td style="padding:20px 24px 6px 24px;">
                <p style="margin:0;font-size:16px;line-height:1.6;color:#374151;">
                  Скопируйте этот код и вставьте его в Enigma.
                </p>
              </td>
            </tr>

            <tr>
              <td style="padding:14px 24px 6px 24px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                  <tr>
                    <td align="center" style="background:#f3f4f6;border:1px solid #e5e7eb;border-radius:14px;padding:18px;">
                      <div style="font-size:40px;line-height:1;letter-spacing:0.28em;font-weight:800;color:#111827;user-select:all;">
                        {{ .Token }}
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td style="padding:12px 24px 0 24px;">
                <div
                  style="display:block;width:100%;box-sizing:border-box;text-align:center;background:#6d28d9;color:#ffffff;font-size:17px;font-weight:700;line-height:1;padding:16px;border-radius:12px;user-select:none;"
                >
                  Скопировать код
                </div>
              </td>
            </tr>

            <tr>
              <td style="padding:18px 24px 26px 24px;">
                <p style="margin:0;font-size:13px;line-height:1.6;color:#6b7280;">
                  Кнопка выше сделана для удобства чтения. В почтовых клиентах JavaScript обычно отключен, поэтому
                  копирование делается вручную: выделите код и скопируйте.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
