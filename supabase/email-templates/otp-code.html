<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="supported-color-schemes" content="dark" />
    <title>Подтверждение входа — Enigma</title>
    <!-- Supabase Auth (OTP): {{ .Token }} — тема письма задаётся в Dashboard, не дублируем её в теле -->
    <style type="text/css">
      .mail-bg {
        background-color: #0b0f14 !important;
      }
      .mail-card {
        background-color: #111827 !important;
      }
      .text-fg {
        color: #ffffff !important;
      }
      .text-muted {
        color: #9ca3af !important;
      }
      .code-box {
        background: linear-gradient(90deg, #8b5fff 0%, #7b4fe8 45%, #22d3ee 100%) !important;
      }
      .code-digit {
        color: #ffffff !important;
        font-weight: 700 !important;
        font-size: 30px !important;
        line-height: 1.15 !important;
        letter-spacing: 0.42em !important;
        font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace !important;
      }
      .footer-line {
        color: #9ca3af !important;
        font-size: 13px !important;
        line-height: 1.5 !important;
      }
      .copyright {
        color: #6b7280 !important;
        font-size: 11px !important;
      }
    </style>
  </head>
  <body
    class="mail-bg"
    style="margin:0;padding:0;background-color:#0b0f14;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Arial,sans-serif;color:#ffffff;"
  >
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" class="mail-bg" style="background-color:#0b0f14;padding:28px 16px;">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            class="mail-card"
            style="max-width:420px;background-color:#111827;border-radius:16px;border-collapse:separate;"
          >
            <tr>
              <td align="center" style="padding:32px 28px 8px 28px;">
                <p class="text-fg" style="margin:0;font-size:20px;font-weight:700;letter-spacing:-0.02em;color:#ffffff;">
                  Enigma
                </p>
                <h1 class="text-fg" style="margin:10px 0 0 0;font-size:22px;line-height:1.25;font-weight:700;color:#ffffff;text-align:center;">
                  Подтверждение входа
                </h1>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:20px 28px 0 28px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:separate;">
                  <tr>
                    <td
                      class="code-box"
                      align="center"
                      style="border-radius:14px;padding:28px 20px;background:linear-gradient(90deg,#8b5fff 0%,#7b4fe8 45%,#22d3ee 100%);"
                    >
                      <span class="code-digit" style="display:inline-block;text-align:center;color:#ffffff;font-weight:700;font-size:30px;line-height:1.15;letter-spacing:0.42em;font-family:ui-monospace,'SF Mono',Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace;user-select:all;-webkit-user-select:all;">
                        {{ .Token }}
                      </span>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td align="center" class="footer-line" style="padding:28px 28px 8px 28px;color:#9ca3af;font-size:13px;line-height:1.5;">
                Если вы не запрашивали код, просто проигнорируйте это письмо.
              </td>
            </tr>
            <tr>
              <td align="center" class="copyright" style="padding:4px 28px 32px 28px;color:#6b7280;font-size:11px;">
                © Enigma
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
